
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wisecow
  namespace: wisecow
  annotations:
    cert-manager.io/cluster-issuer: "wisecow-ca-issuer"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - wisecow.local
      secretName: wisecow-tls
  rules:
    - host: wisecow.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wisecow
                port:
                  number: 80
