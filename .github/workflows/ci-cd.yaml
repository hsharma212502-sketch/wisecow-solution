name: CI-CD

# Build & push the Wisecow image on every push to main (and tags), then
# optionally run continuous deployment to the Kubernetes cluster.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # ghcr.io/<owner>/<repo> — lowercased automatically below.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ------------------------------------------------------------------
  # 1) Build the Docker image and push it to GitHub Container Registry
  # ------------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # required to push to GHCR
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # Skip the login/push on PRs from forks (no secret access); build only.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------
  # 2) Continuous Deployment [Challenge Goal]
  #    Deploy the freshly built image to the Kubernetes cluster.
  #
  #    This job assumes a self-hosted runner with kubectl access to the
  #    Kind/Minikube cluster, OR a KUBE_CONFIG_DATA secret holding a
  #    base64-encoded kubeconfig for a reachable cluster.
  # ------------------------------------------------------------------
  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > "$HOME/.kube/config"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Derive lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          kubectl apply -f k8s/02-service.yaml
          # Issuer + Ingress are applied if cert-manager / ingress are present.
          kubectl apply -f k8s/03-tls-issuer.yaml || echo "cert-manager not installed; skipping issuer"
          kubectl apply -f k8s/04-ingress-tls.yaml || echo "ingress controller not installed; skipping ingress"
          kubectl apply -f k8s/01-deployment.yaml

      - name: Roll out the new image (immutable SHA tag)
        run: |
          IMAGE="${REGISTRY}/${{ steps.img.outputs.name }}:sha-${GITHUB_SHA::40}"
          # metadata-action emits sha-<7..40 chars>; use the short form it produced.
          SHORT="${REGISTRY}/${{ steps.img.outputs.name }}:sha-$(git rev-parse --short=7 HEAD)"
          echo "Setting image to $SHORT"
          kubectl -n wisecow set image deployment/wisecow wisecow="$SHORT"
          kubectl -n wisecow rollout status deployment/wisecow --timeout=120s
